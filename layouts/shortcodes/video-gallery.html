{{ $dir := .Get "dir" }}
{{ $path := printf "static/%s" $dir }}
{{ $classification := .Get "classification" | default "[VIDEO EVIDENCE GALLERY]" }}

{{ if fileExists $path }}
<figure class="group evidence-container relative my-8 overflow-hidden rounded-xl bg-zinc-900/70 dark:bg-zinc-900/70 backdrop-blur-md border border-white/10 transition-all duration-300 hover:-translate-y-[2px] hover:shadow-lg hover:shadow-blue-500/10 hover:border-blue-500/30">
  
  <!-- Metadata Bar -->
  <div class="flex items-center justify-between px-4 py-2 border-b border-white/10 bg-zinc-950/50">
    <div class="flex items-center gap-3">
        <div class="w-2 h-2 rounded-full bg-blue-600 dark:bg-blue-500 animate-pulse"></div>
        <span class="text-xs font-mono tracking-wider font-semibold text-blue-700 dark:text-blue-400">
          {{ $classification }}
        </span>
    </div>
    <!-- Decorative dots -->
    <div class="flex gap-1.5">
      <div class="w-2 h-2 rounded-full bg-white/20 transition-colors group-hover:bg-blue-500/50"></div>
      <div class="w-2 h-2 rounded-full bg-white/20 transition-colors group-hover:bg-blue-500/50" style="transition-delay: 75ms;"></div>
      <div class="w-2 h-2 rounded-full bg-white/20 transition-colors group-hover:bg-blue-500/50" style="transition-delay: 150ms;"></div>
    </div>
  </div>

  <!-- Content Payload -->
  <div class="p-4">
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
      {{ $files := readDir $path }}
      {{ range $files }}
        {{ $filename := .Name }}
        {{ if or (strings.HasSuffix $filename ".mp4") (strings.HasSuffix $filename ".webm") }}
          <a href="/{{ $dir }}/{{ $filename }}" data-fslightbox="video-gallery" data-type="video" class="block overflow-hidden rounded-lg border border-white/5 bg-zinc-800/50 hover:border-blue-500/50 transition-colors duration-300 relative group/video">
            <video src="/{{ $dir }}/{{ $filename }}" class="w-full h-auto object-cover aspect-video group-hover/video:scale-105 transition-transform duration-500" preload="none"></video>
            <div class="absolute inset-0 flex items-center justify-center opacity-70 group-hover/video:opacity-100 transition-opacity">
               <div class="w-12 h-12 bg-black/50 backdrop-blur-sm rounded-full flex items-center justify-center border border-white/20">
                  <svg class="w-6 h-6 text-white translate-x-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
               </div>
            </div>
          </a>
        {{ end }}
      {{ end }}
    </div>
  </div>
</figure>
{{ else }}
  <div class="text-text-muted italic border border-red-500/30 bg-red-500/10 p-4 rounded-xl my-8">
    [ERROR] {{ i18n "galleryNotFound" | default "Directory not found:" }} {{ $dir }}
  </div>
{{ end }}
