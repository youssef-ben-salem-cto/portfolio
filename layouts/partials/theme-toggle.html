<button class="theme-toggle focus:outline-none hover:opacity-70 transition-opacity flex items-center justify-center" style="width: 2.5rem; height: 2.5rem; font-size: 1.5rem;" aria-label="Toggle Dark Mode">
  <!-- Sun icon represents Light Mode status -->
  <i class="fas fa-sun block dark:hidden" style="color: #000000;"></i>
  <!-- Moon icon represents Dark Mode status -->
  <i class="fas fa-moon hidden dark:block" style="color: #f3f4f6;"></i>
</button>
