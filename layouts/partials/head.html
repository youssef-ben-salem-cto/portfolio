
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- 🔖 Dynamic title -->
<title>
  {{ if .IsHome }}
    {{ .Site.Title }} | {{ .Site.Params.tagline }}
  {{ else }}
    {{ .Title }} | {{ .Site.Title }}
  {{ end }}
</title>

<!-- ✅ Meta tags -->
<meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
<meta name="author" content="{{ .Site.Params.author | default .Site.Params.name }}" />
<link rel="canonical" href="{{ .Permalink }}" />

<!-- 🌐 Open Graph -->
<meta property="og:type" content="website" />
<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }} | {{ .Site.Params.tagline }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}" />
<meta property="og:description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
<meta property="og:url" content="{{ .Permalink }}" />
<meta property="og:image" content="{{ with .Params.socialImage }}{{ strings.TrimPrefix "/" . | absURL }}{{ else }}{{ with site.Params.og_image }}{{ strings.TrimPrefix "/" . | absURL }}{{ end }}{{ end }}">
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:site_name" content="{{ .Site.Title }}" />

<!-- 🐦 Twitter Card -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }} | {{ .Site.Params.tagline }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}" />
<meta name="twitter:description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
<meta name="twitter:image" content="{{ with .Params.socialImage }}{{ strings.TrimPrefix "/" . | absURL }}{{ else }}{{ with site.Params.og_image }}{{ strings.TrimPrefix "/" . | absURL }}{{ end }}{{ end }}" />

<!-- 🔧 Favicon -->
<link rel="icon" href="{{ "/favicon.ico" | relURL }}" />

<!-- 📊 Structured Data (JSON-LD) -->
{{ partial "schema.html" . }}

<!-- Fonts & Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />

<!-- GSAP Animation Library - Loaded dynamically from node_modules or CDN fallback -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
  /* Failsafe to ensure elements are visible if JS fails */
  .fade-in-visible { opacity: 1 !important; transform: none !important; }
  
  noscript section[data-animate],
  noscript [data-animation],
  body.js-failed section[data-animate],
  body.js-failed [data-animation] {
    opacity: 1 !important;
    transform: none !important;
  }
</style>
<script>
  // Failsafe: if GSAP fails to show elements after 2 seconds, force them visible
  setTimeout(() => {
      document.body.classList.add('js-failed');
      document.querySelectorAll('[data-animation], [data-animate]').forEach(el => {
          el.style.opacity = '1';
          el.style.transform = 'none';
      });
  }, 2000);
</script>
